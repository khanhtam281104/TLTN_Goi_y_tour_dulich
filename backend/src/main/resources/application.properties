spring.application.name=tour-recommendation

# Server Port
server.port=8080

# Database Configuration (Change tour_db, username, and password to match your setup)
spring.datasource.url=jdbc:mysql://localhost:3306/tour_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=113004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
